# Gate2Reality — Custom Gradle Properties Template
# (Assets/Plugins/Android/gradleTemplate.properties).
# AndroidX оставляем (его требует AR Foundation/ARCore). Jetifier ВЫКЛЮЧЕН:
# он нужен был только под MediaPipe (временно отключён), а на AGP 8 включённый
# jetifier ломает namespace ARCore — «com.google.ar.core used in multiple
# modules :arcore_client:, :unityandroidpermissions:». Дефолт AGP 8 — тоже false.
# ВЕРНУТЬ вместе с MediaPipe: android.enableJetifier=true.

org.gradle.jvmargs=-Xmx4096M -Dfile.encoding=UTF-8
org.gradle.parallel=true

android.useAndroidX=true
android.enableJetifier=false

# Список расширений потоковых ассетов — Unity заполняет токен **STREAMING_ASSETS**.
# На него ссылается noCompress в main/launcher шаблонах (unityStreamingAssets.tokenize).
unityStreamingAssets=**STREAMING_ASSETS**

# Unity подставляет свои значения сюда:
**ADDITIONAL_PROPERTIES**
