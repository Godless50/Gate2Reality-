apply plugin: 'com.android.application'

// Gate2Reality — launcher Gradle template (Custom Launcher Gradle Template).
// Зависимость MediaPipe живёт в mainTemplate.gradle (unityLibrary), где
// компилируется Kotlin-мост; здесь — только сборка приложения и упаковка.
// arm64-only: Pixel 9 / S26 / HONOR 90 — все ARM64 (см. чек-лист §2).

android {
    compileSdkVersion **APIVERSION**
    buildToolsVersion '**BUILDTOOLS**'

    defaultConfig {
        minSdkVersion **MINSDKVERSION**
        targetSdkVersion **TARGETSDKVERSION**
        applicationId '**APPLICATIONID**'
        ndk {
            abiFilters 'arm64-v8a'
        }
    }

    aaptOptions {
        noCompress = ['.unity3d', '.ress', '.resource', '.obb', '.task', '.sentis', '.onnx'] + unityStreamingAssets.tokenize(', ')
        ignoreAssetsPattern = "!.svn:!.git:!.ds_store:!*.scc:.*:!CVS:!thumbs.db:!picasa.ini:!*~"
    }

    packagingOptions {
        doNotStrip '*/arm64-v8a/*.so'
    }

    **SIGN**
    **BUILDSETTINGS**
}

dependencies {
    implementation fileTree(dir: 'libs', include: ['*.jar'])
    **DEPS**
}
