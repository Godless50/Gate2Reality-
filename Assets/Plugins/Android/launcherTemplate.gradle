apply plugin: 'com.android.application'

// Gate2Reality launcher Gradle template
// Adds MediaPipe Tasks-GenAI for on-device LLM (Gemma)

android {
    compileSdkVersion **APIVERSION**
    buildToolsVersion '**BUILDTOOLS**'

    defaultConfig {
        minSdkVersion **MINSDKVERSION**
        targetSdkVersion **TARGETSDKVERSION**
        applicationId '**APPLICATIONID**'
        ndk {
            abiFilters 'arm64-v8a'
        }
    }

    aaptOptions {
        noCompress = ['.unity3d', '.ress', '.resource', '.obb'] + unityStreamingAssets.tokenize(', ')
        ignoreAssetsPattern = "!.svn:!.git:!.ds_store:!*.scc:.*:!CVS:!thumbs.db:!picasa.ini:!*~"
    }

    packagingOptions {
        doNotStrip '*/arm64-v8a/*.so'
    }

    **SIGN**
    **BUILDSETTINGS**
}

dependencies {
    implementation fileTree(dir: 'libs', include: ['*.jar'])
    // MediaPipe Tasks GenAI for Gemma on-device inference
    implementation 'com.google.mediapipe:tasks-genai:0.10.14'
    **DEPS**
}
